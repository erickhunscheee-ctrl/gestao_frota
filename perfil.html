<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Perfil — Verda</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/perfil.css">
</head>

<body>

  <!-- HEADER + HERO -->
  <div class="header">
    <div class="header-top">
      <div class="brand">
        <div class="brand-dot">
          <svg width="12" height="12" viewBox="0 0 14 14" fill="none">
            <path d="M7 2L12 11H2L7 2Z" fill="white" />
          </svg>
        </div>
        <span class="brand-name">Verda</span>
      </div>
      <button class="edit-btn" onclick="openModal()">Editar perfil</button>
    </div>

    <div class="profile-hero">
      <div class="profile-avatar" id="prof-avatar">--</div>
      <div>
        <div class="profile-name" id="prof-name">Carregando...</div>
        <div class="profile-role" id="prof-role">...</div>
        <div class="profile-badge">
          <svg width="10" height="10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path d="M9 11l3 3L22 4" />
          </svg>
          Conta verificada
        </div>
      </div>
    </div>
  </div>

  <!-- STATS ROW -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num" id="stat-mes">0h</div>
      <div class="stat-label">Este mês</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-regs">0</div>
      <div class="stat-label">Registros</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-maqs">0</div>
      <div class="stat-label">Máquinas</div>
    </div>
  </div>

  <!-- DADOS PESSOAIS -->
  <div class="section-title">Dados pessoais</div>

  <div class="info-card">
    <div class="info-row">
      <div class="info-left">
        <div class="info-icon">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#1D9E75" stroke-width="2">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
        </div>
        <div>
          <div class="info-key">Nome completo</div>
          <div class="info-value" id="val-nome">...</div>
        </div>
      </div>
    </div>
    <div class="info-row">
      <div class="info-left">
        <div class="info-icon">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#1D9E75" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
            <polyline points="22,6 12,13 2,6" />
          </svg>
        </div>
        <div>
          <div class="info-key">E-mail</div>
          <div class="info-value" id="val-email">...</div>
        </div>
      </div>
    </div>
    <div class="info-row">
      <div class="info-left">
        <div class="info-icon">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#1D9E75" stroke-width="2">
            <path
              d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.63A2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z" />
          </svg>
        </div>
        <div>
          <div class="info-key">Telefone</div>
          <div class="info-value" id="val-tel">...</div>
        </div>
      </div>
    </div>
    <div class="info-row">
      <div class="info-left">
        <div class="info-icon">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#1D9E75" stroke-width="2">
            <rect x="2" y="7" width="20" height="14" rx="2" />
            <path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16" />
          </svg>
        </div>
        <div>
          <div class="info-key">Empresa</div>
          <div class="info-value" id="val-empresa">...</div>
        </div>
      </div>
    </div>
    <div class="info-row">
      <div class="info-left">
        <div class="info-icon">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#1D9E75" stroke-width="2">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z" />
            <circle cx="12" cy="10" r="3" />
          </svg>
        </div>
        <div>
          <div class="info-key">Unidade</div>
          <div class="info-value" id="val-unidade">...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- CONFIGURAÇÕES (Mantido igual) -->
  <div class="section-title">Configurações</div>
  <div class="menu-card">
    <!-- Itens de menu simplificados para brevidade -->
    <div class="menu-item">
      <div class="menu-label">Notificações</div>
      <label class="toggle"><input type="checkbox" checked /><span class="toggle-slider"></span></label>
    </div>
  </div>

  <button class="logout-btn" onclick="fazerLogout()">
    <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />
      <polyline points="16 17 21 12 16 7" />
      <line x1="21" y1="12" x2="9" y2="12" />
    </svg>
    Sair da conta
  </button>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <div class="nav-item" onclick="location.href='maquinas.html'">
      <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="#6b7270" stroke-width="2">
        <rect x="2" y="14" width="8" height="7" rx="1" />
        <rect x="9" y="9" width="6" height="12" rx="1" />
        <rect x="16" y="4" width="6" height="17" rx="1" />
      </svg>
      <span class="nav-label">Máquinas</span>
    </div>
    <div class="nav-item" onclick="location.href='registros.html'">
      <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="#6b7270" stroke-width="2">
        <path d="M9 11l3 3L22 4" />
        <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11" />
      </svg>
      <span class="nav-label">Registros</span>
    </div>
    <div class="nav-item" onclick="location.href='historico.html'">
      <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="#6b7270" stroke-width="2">
        <circle cx="12" cy="12" r="10" />
        <path d="M12 6v6l4 2" />
      </svg>
      <span class="nav-label">Histórico</span>
    </div>
    <div class="nav-item active">
      <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
        <circle cx="12" cy="7" r="4" />
      </svg>
      <span class="nav-label">Perfil</span>
    </div>
  </nav>

  <!-- MODAL EDITAR PERFIL -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeOutside(event)">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">Editar perfil</div>
      <div class="form-field">
        <label class="form-label">Nome completo</label>
        <input type="text" class="form-input" id="edit-nome" />
      </div>
      <div class="form-field">
        <label class="form-label">E-mail</label>
        <input type="email" class="form-input" id="edit-email" />
      </div>
      <div class="form-field">
        <label class="form-label">Telefone</label>
        <input type="tel" class="form-input" id="edit-tel" />
      </div>
      <button class="btn-submit" onclick="salvarAlteracoesPerfil()">Salvar alterações</button>
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
    </div>
  </div>

  <!-- TOAST STRUCTURE -->
  <div class="toast" id="toast" style="display: none; top: 24px; bottom: auto;">
    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <path d="M20 6L9 17l-5-5" />
    </svg>
    <span id="toastMsg">Processando...</span>
  </div>

  <script>
    function openModal() { document.getElementById('modalOverlay').classList.add('open'); }
    function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
    function closeOutside(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }
  </script>
  <script src="js/auth.js"></script>
  <script src="js/perfil.js"></script>
</body>

</html>
