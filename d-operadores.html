<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Operadores — Verda Admin</title>
    <link rel="stylesheet" href="./css/shared.css" />
</head>

<body>

    <main class="main">
        <div class="topbar">
            <div class="topbar-left">
                <span class="topbar-title">Operadores</span>
                <span class="topbar-sub">Gerenciar operadores da frota</span>
            </div>
            <div class="topbar-right">
                <div class="date-badge" id="current-date">
                    <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" />
                        <path d="M16 2v4M8 2v4M3 10h18" />
                    </svg>--/--/----
                </div>
                <button class="topbar-btn btn-outline" onclick="exportarPDF()" style="margin-right: 8px; border-color: var(--accent); color: var(--accent);">
                    <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" style="margin-right: 4px;">
                        <path d="M12 10v6m0 0l-3-3m3 3l3-3M5 20h14" />
                    </svg>
                    Exportar PDF
                </button>
                <button class="topbar-btn btn-primary" onclick="openModal('operador')">
                    <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                        stroke-width="2.5">
                        <path d="M12 5v14M5 12h14" />
                    </svg>
                    Novo Operador
                </button>
            </div>
        </div>

        <div class="page-content fade-in">
            <div class="card">
                <div class="filter-row">
                    <span class="filter-label">Filtrar:</span>
                    <div class="filter-chip-row">
                        <div class="fchip active" onclick="filterTable(this,'op-table','todos')">Todos (0)</div>
                        <div class="fchip" onclick="filterTable(this,'op-table','Trabalhando')">Trabalhando (0)</div>
                        <div class="fchip" onclick="filterTable(this,'op-table','Offline')">Offline (0)</div>
                    </div>
                    <div style="margin-left:auto;display:flex;gap:8px;">
                        <input class="filter-input" type="text" placeholder="Buscar nome..."
                            oninput="searchTable('op-table',this.value,0)">
                    </div>
                </div>

                <table class="data-table" id="op-table">
                    <thead>
                        <tr>
                            <th>Operador</th>
                            <th>Status</th>
                            <th>Unidade/Obra</th>
                            <th>Máquina</th>
                            <th>Horas hoje</th>
                            <th>Horas mês</th>
                            <th>Horímetro</th>
                            <th>Combustível hoje</th>
                            <th>Consumo L/h</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="9" style="text-align:center; padding:40px; color:gray;">Carregando
                                operadores...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="./js/auth.js"></script>
    <script src="./js/shared.js"></script>
    <script src="./js/d-operadores.js"></script>
</body>

</html>
