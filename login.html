<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Verda</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="css/login.css">
</head>

<body>

  <div class="card">

    <div class="brand">
      <div class="brand-dot">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 2L12 11H2L7 2Z" fill="white" />
        </svg>
      </div>
      <span class="brand-name">Verda</span>
    </div>

    <h1 class="heading">Bem-vindo de volta</h1>
    <p class="sub">Entre com sua conta para continuar</p>

    <div class="field">
      <label class="label" for="email">E-mail</label>
      <input type="email" id="email" placeholder="voce@exemplo.com" />
    </div>

    <div class="field">
      <label class="label" for="senha">Senha</label>
      <input type="password" id="senha" placeholder="••••••••" />
    </div>

    <div class="row-forgot">
      <a class="forgot" href="#">Esqueceu a senha?</a>
    </div>

    <button class="btn-primary">Entrar</button>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">ou</span>
      <div class="divider-line"></div>
    </div>

    <button class="btn-google">
      <svg width="16" height="16" viewBox="0 0 24 24">
        <path fill="#4285F4"
          d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
        <path fill="#34A853"
          d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
        <path fill="#FBBC05"
          d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
        <path fill="#EA4335"
          d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
      </svg>
      Continuar com Google
    </button>

    <div class="signup-row">
      Não tem uma conta? <a href="#">Cadastre-se</a>
    </div>

  </div>
  <div class="toast" id="toast" style="display: none;">
    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <path d="M20 6L9 17l-5-5" />
    </svg>
    <span id="toastMsg">Processando...</span>
  </div>
  <script src="js/login.js"></script>
</body>

</html>
