<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Operadores — Verda Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/admin-operadores.css">
</head>

<body>

  <div class="header">
    <div class="header-top">
      <div class="brand">
        <div class="brand-dot">
          <svg width="12" height="12" viewBox="0 0 14 14" fill="none">
            <path d="M7 2L12 11H2L7 2Z" fill="white" />
          </svg>
        </div>
        <span class="brand-name">Verda</span>
      </div>
      <span class="admin-badge">ADMIN</span>
    </div>
    <p class="page-title">Operadores</p>
  </div>

  <div class="search-wrap">
    <div class="search-box">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2">
        <circle cx="11" cy="11" r="8" />
        <path d="M21 21l-4.35-4.35" />
      </svg>
      <input type="search" placeholder="Buscar operador..." oninput="filterOps(this.value)" />
    </div>
  </div>

  <div class="filter-wrap">
    <div class="filter-chip active" onclick="setFilter(this,'todos')">Todos (0)</div>
    <div class="filter-chip" onclick="setFilter(this,'working')">Trabalhando (0)</div>
    <div class="filter-chip" onclick="setFilter(this,'pause')">Pausa (0)</div>
    <div class="filter-chip" onclick="setFilter(this,'offline')">Offline (0)</div>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-num green" id="stat-ativos">0</div>
      <div class="stat-label">Ativos</div>
    </div>
    <div class="stat-card">
      <div class="stat-num amber" id="stat-pausa">0</div>
      <div class="stat-label">Em pausa</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" style="color:#94A3B8" id="stat-offline">0</div>
      <div class="stat-label">Offline</div>
    </div>
  </div>

  <div class="section-title">Lista de operadores</div>

  <div class="list" id="opList">
      <!-- Mensagem de carregamento padrão -->
      <p style="text-align:center; padding:20px; color:gray;">Carregando operadores...</p>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <div class="nav-item" onclick="location.href='admin-dashboard.html'">
      <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="#6b7270" stroke-width="2">
        <rect x="3" y="3" width="7" height="7" rx="1" />
        <rect x="14" y="3" width="7" height="7" rx="1" />
        <rect x="3" y="14" width="7" height="7" rx="1" />
        <rect x="14" y="14" width="7" height="7" rx="1" />
      </svg>
      <span class="nav-label">Visão Geral</span>
    </div>
    <div class="nav-item active">
      <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" />
        <circle cx="9" cy="7" r="4" />
        <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" />
      </svg>
      <span class="nav-label">Operadores</span>
    </div>
    <div class="nav-item" onclick="location.href='admin-maquinas.html'">
      <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="#6b7270" stroke-width="2">
        <rect x="2" y="14" width="8" height="7" rx="1" />
        <rect x="9" y="9" width="6" height="12" rx="1" />
        <rect x="16" y="4" width="6" height="17" rx="1" />
      </svg>
      <span class="nav-label">Máquinas</span>
    </div>
    <div class="nav-item" onclick="location.href='admin-combustivel.html'">
      <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="#6b7270" stroke-width="2">
        <path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-1.4 5M17 13l1.4 5M9 18h6" />
      </svg>
      <span class="nav-label">Combustível</span>
    </div>
  </nav>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeOutside(event)">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-avatar" id="mAvatar">--</div>
      <div id="mBadge" class="status-badge badge-working" style="display:inline-flex;margin-bottom:12px;">Trabalhando</div>
      <div class="modal-name" id="mName">—</div>
      <div class="modal-role" id="mRole">—</div>
      <div class="modal-metrics">
        <div class="modal-metric">
          <div class="mm-label">Horas hoje</div>
          <div class="mm-value" id="mHours">—<span>h</span></div>
        </div>
        <div class="modal-metric">
          <div class="mm-label">Horímetro</div>
          <div class="mm-value" id="mHorimeter">—</div>
        </div>
        <div class="modal-metric">
          <div class="mm-label">Combustível</div>
          <div class="mm-value" id="mFuel">—<span>L</span></div>
        </div>
      </div>
      <div class="modal-section">Detalhes</div>
      <div class="info-row"><span class="info-key">Máquina</span><span class="info-value" id="mMachine">—</span></div>
      <div class="info-row"><span class="info-key">Local</span><span class="info-value" id="mLocal">—</span></div>
      <div class="info-row"><span class="info-key">Consumo médio</span><span class="info-value" id="mConsump">—</span></div>
      <button class="btn-close" onclick="closeModal()">Fechar</button>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/admin-operadores.js"></script>
</body>
</html>
